<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/head-logo.png" />

    <!-- Primary SEO -->
    <title>Femodera — Academic Research & Technology Support</title>

      name="description"

      name="keywords"
      content="academic research support, final year projects, data analysis, software development, machine learning, research assistance"
    />

    <meta property="og:type" content="website" />

      property="og:description"

      name="twitter:description"
